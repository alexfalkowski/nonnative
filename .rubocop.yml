AllCops:
  TargetRubyVersion: 3.4
  DisplayCopNames: true
  NewCops: enable
  Exclude:
    - "bin/**/*"
    - "vendor/**/*"
    - "test/grpc/**/*"

Layout/LineLength:
  Max: 150

Lint/HashCompareByIdentity:
  Enabled: false

Metrics/MethodLength:
  Max: 20

Metrics/BlockLength:
  Max: 90

Metrics/AbcSize:
  Max: 25

Metrics/ClassLength:
  Max: 150

Style/Documentation:
  Enabled: false

Style/NumericPredicate:
  Enabled: false

Style/FileOpen:
  Enabled: false

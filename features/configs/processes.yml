version: "1.0"
name: test
url: http://localhost:4567
log: test/reports/nonnative.log
processes:
  - name: start_1
    command: features/support/bin/start 12_321
    timeout: 5
    wait: 0.2
    host: 127.0.0.1
    ports:
      - 12321
    log: test/reports/12_321.log
